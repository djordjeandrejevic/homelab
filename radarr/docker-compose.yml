services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Belgrade
    volumes:
      - ~/apps/radarr/config:/config
      - /mnt/hitachi/plex/movies:/movies
      - /mnt/hitachi/plex/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
